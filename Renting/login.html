<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomNest — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="lp-bg"></div>
    <div class="lp-pattern"></div>
    <div class="lp-glow1"></div>
    <div class="lp-glow2"></div>

    <div class="lp-content">

      <a class="lp-logo" href="index.html">
        <div class="logo-dot"></div>
        <span class="logo-text">RoomNest</span>
      </a>

      <div class="lp-hero">
        <div class="lp-eyebrow">Room Renting System</div>

        <h2 class="lp-title">
          Rent Smart, <em>Live Better</em>
        </h2>

        <div class="lp-cards">

          <div class="lp-card">
            <div class="lp-card-icon ic-blue">🙋</div>
            <div class="lp-card-text">
              <strong>Tenants</strong>
            </div>
          </div>

          <div class="lp-card">
            <div class="lp-card-icon ic-green">🏠</div>
            <div class="lp-card-text">
              <strong>Landlords</strong>
            </div>
          </div>

          <div class="lp-card">
            <div class="lp-card-icon ic-gold">🛡️</div>
            <div class="lp-card-text">
              <strong>Trusted</strong>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <button onclick="toggleSiteTheme()" id="siteThemeToggle"
      style="position:absolute;top:20px;right:20px;padding:8px 12px;font-size:18px;cursor:pointer;border:1.5px solid var(--border);border-radius:10px;background:transparent;z-index:10;"
      title="Toggle Dark/Light Mode">🌓</button>

    <div class="form-container">

      <div class="form-header">
        <h1 id="formTitle">Glad to see you!</h1>
        <p id="formSubtitle">Sign in to your account</p>
      </div>

      <!-- TAB -->
      <div class="tab-row">

        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">

          Sign In
        </button>

        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">

          Register
        </button>

      </div>

      <!-- LOGIN FORM -->
      <div id="panelLogin">

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com">
          <span class="err-msg" id="err-loginEmail"></span>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="••••••••">
            <button type="button" class="toggle-pw" onclick="togglePw('loginPassword',this)">👁</button>
          </div>
          <span class="err-msg" id="err-loginPassword"></span>
        </div>

        <div class="form-group">
          <label>Sign In As</label>
          <select id="loginRole">
            <option value="tenant">Tenant</option>
            <option value="landlord">Landlord</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <!-- General login error (wrong credentials / blocked) -->
        <div id="loginAlert" style="display:none; background:#FEF2F2; border:1.5px solid #FECACA; color:#DC2626; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:500; margin-bottom:14px;"></div>

        <!-- LOGIN BUTTON -->
        <button class="btn-submit" id="loginBtn" onclick="loginUser()">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>

        <p class="switch-text">No account? <a onclick="switchTab('register')">Register</a></p>

      </div>

      <!-- REGISTER FORM -->
      <div id="panelRegister" style="display:none;">

        <div class="form-group">
          <label>I want to join as</label>
          <div class="role-grid">
            <div class="role-opt selected" id="role-tenant" onclick="selectRole('tenant')">
              <div class="ro-icon">🙋</div>
              <div class="ro-label">Tenant</div>
            </div>
            <div class="role-opt" id="role-landlord" onclick="selectRole('landlord')">
              <div class="ro-icon">🏠</div>
              <div class="ro-label">Landlord</div>
            </div>
            <div class="role-opt" id="role-admin" onclick="selectRole('admin')">
              <div class="ro-icon">🛡️</div>
              <div class="ro-label">Admin</div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name">
          <span class="err-msg" id="err-regName"></span>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="your@email.com">
          <span class="err-msg" id="err-regEmail"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="regPhone" placeholder="+855 12 345 678">
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="regGender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" placeholder="Min. 6 chars">
              <button type="button" class="toggle-pw" onclick="togglePw('regPassword',this)">👁</button>
            </div>
            <span class="err-msg" id="err-regPassword"></span>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="regConfirm" placeholder="Repeat password">
              <button type="button" class="toggle-pw" onclick="togglePw('regConfirm',this)">👁</button>
            </div>
            <span class="err-msg" id="err-regConfirm"></span>
          </div>
        </div>

        <!-- General register error (e.g. email already exists) -->
        <div id="regAlert" style="display:none; background:#FEF2F2; border:1.5px solid #FECACA; color:#DC2626; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:500; margin-bottom:14px;"></div>

        <!-- REGISTER BUTTON -->
        <button class="btn-submit" id="registerBtn" onclick="registerUser()">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>

        <p class="switch-text">Have an account? <a onclick="switchTab('login')">Sign in</a></p>

      </div>

    </div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- JAVASCRIPT FILES -->
  <script src="js/data.js"></script>
  <script src="js/app-data.js"></script>
  <script src="js/main-functions.js"></script>
  <script src="js/login.js"></script>
  <script>document.addEventListener('DOMContentLoaded', applySiteTheme);</script>

</body>

</html>
